name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Clippy (core + protocol + cli)
        run: cargo clippy -p ipmsg-protocol -p ipmsg-core -p ipmsg-cli --all-targets
      # Tauri app needs extra system deps; skip in CI for now unless explicitly wanted
      # - name: Clippy (all)
      #   run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Run tests (protocol + core)
        run: cargo test -p ipmsg-protocol -p ipmsg-core --lib
      - name: Build check (cli)
        run: cargo build -p ipmsg-cli

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build CLI
        run: cargo build --release -p ipmsg-cli
      - name: Build WASM
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build -p ipmsg-wasm --target wasm32-unknown-unknown
