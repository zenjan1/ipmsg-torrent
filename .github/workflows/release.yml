name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  cli-linux:
    name: CLI - Linux x86_64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Build CLI
        run: |
          cargo build --release -p ipmsg-cli --target x86_64-unknown-linux-gnu
          strip target/x86_64-unknown-linux-gnu/release/ipmsg-cli
          tar czf ipmsg-cli-${{ github.ref_name }}-linux-x86_64.tar.gz -C target/x86_64-unknown-linux-gnu/release ipmsg-cli
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x86_64
          path: ipmsg-torrent/ipmsg-cli-${{ github.ref_name }}-linux-x86_64.tar.gz

  cli-windows:
    name: CLI - Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Build CLI
        run: cargo build --release -p ipmsg-cli --target x86_64-pc-windows-msvc
      - name: Package
        run: |
          cd target/x86_64-pc-windows-msvc/release
          7z a ../../../ipmsg-cli-${{ github.ref_name }}-windows-x86_64.zip ipmsg-cli.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x86_64
          path: ipmsg-torrent/ipmsg-cli-${{ github.ref_name }}-windows-x86_64.zip

  cli-macos:
    name: CLI - macOS Universal
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Build CLI universal
        run: |
          cargo build --release -p ipmsg-cli --target x86_64-apple-darwin
          cargo build --release -p ipmsg-cli --target aarch64-apple-darwin
          lipo -create -output target/release/ipmsg-cli \
            target/x86_64-apple-darwin/release/ipmsg-cli \
            target/aarch64-apple-darwin/release/ipmsg-cli
          strip target/release/ipmsg-cli
          tar czf ipmsg-cli-${{ github.ref_name }}-macos-universal.tar.gz -C target/release ipmsg-cli
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-universal
          path: ipmsg-torrent/ipmsg-cli-${{ github.ref_name }}-macos-universal.tar.gz

  app-linux:
    name: App - Linux (deb + AppImage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      - name: Build Tauri App
        run: cargo tauri build --manifest-path crates/app/src-tauri/Cargo.toml --bundles deb,appimage
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-linux
          path: |
            ipmsg-torrent/crates/app/src-tauri/target/release/bundle/deb/*.deb
            ipmsg-torrent/crates/app/src-tauri/target/release/bundle/appimage/*.AppImage

  app-windows:
    name: App - Windows (MSI + NSIS)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      - name: Build Tauri App
        run: cargo tauri build --manifest-path crates/app/src-tauri/Cargo.toml --bundles msi,nsis
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: |
            ipmsg-torrent/crates/app/src-tauri/target/release/bundle/msi/*.msi
            ipmsg-torrent/crates/app/src-tauri/target/release/bundle/nsis/*.exe

  app-macos:
    name: App - macOS Universal DMG
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ipmsg-torrent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin --manifest-path crates/app/src-tauri/Cargo.toml
      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin --manifest-path crates/app/src-tauri/Cargo.toml
      - name: Create universal binary
        run: |
          mkdir -p release
          lipo -create -output release/ipmsg-app \
            crates/app/src-tauri/target/x86_64-apple-darwin/release/ipmsg-app \
            crates/app/src-tauri/target/aarch64-apple-darwin/release/ipmsg-app
      - name: Build arm64 .app bundle
        run: cargo tauri build --manifest-path crates/app/src-tauri/Cargo.toml --target aarch64-apple-darwin --bundles macos
      - name: Create universal .app and DMG
        run: |
          APP="crates/app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ipmsg-torrent.app"
          cp release/ipmsg-app "$APP/Contents/MacOS/ipmsg-app"
          mkdir -p release/dmg
          cp -R "$APP" release/dmg/
          ln -s /Applications release/dmg/Applications
          hdiutil create -volname "IPMsg-Torrent" -srcfolder release/dmg \
            -ov -format UDZO "release/IPMsg-Torrent-universal.dmg"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-macos
          path: ipmsg-torrent/release/IPMsg-Torrent-universal.dmg

  app-android:
    name: App - Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ipmsg-torrent
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK and build tools
        run: |
          sdkmanager "ndk;27.0.12077973" "build-tools;36.0.0" "platforms;android-36"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
      - name: Build Android APK
        working-directory: ipmsg-torrent
        run: cargo tauri android build --manifest-path crates/app/src-tauri/Cargo.toml --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: ipmsg-torrent/crates/app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [cli-linux, cli-windows, cli-macos, app-linux, app-windows, app-macos, app-android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts/ -name '*.msi' -exec cp {} release/ \;
          find artifacts/ -name '*.exe' -exec cp {} release/ \;
          find artifacts/ -name '*.dmg' -exec cp {} release/ \;
          find artifacts/ -name '*.apk' -exec cp {} release/ \;
          find artifacts/ -name '*.zip' -exec cp {} release/ \;
          find artifacts/ -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts/ -name '*.deb' -exec cp {} release/ \;
          find artifacts/ -name '*.AppImage' -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "IPMsg-Torrent $TAG" \
            --generate-notes \
            release/*
