appId: com.ipmsg.torrent
productName: IPMsg Torrent
copyright: Copyright © 2024

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}-win.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: IPMsg Torrent
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  license: LICENSE

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
  icon: build/icons
  category: Network
  artifactName: ${productName}-${version}-${arch}-linux.${ext}
  desktop:
    Name: IPMsg Torrent
    Comment: Decentralized P2P Chat Application
    Categories: Network;Chat;InstantMessaging;
    StartupWMClass: ipmsg-torrent

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.social-networking
  artifactName: ${productName}-${version}-${arch}-mac.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

publish: null

asar: true
compression: maximum
removePackageScripts: true
