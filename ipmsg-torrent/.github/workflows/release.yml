name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build
        run: cargo tauri build --manifest-path crates/app/src-tauri/Cargo.toml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            crates/app/src-tauri/target/release/bundle/msi/*.msi
            crates/app/src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin --manifest-path crates/app/src-tauri/Cargo.toml

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin --manifest-path crates/app/src-tauri/Cargo.toml

      - name: Create universal binary
        run: |
          mkdir -p release
          lipo -create -output release/ipmsg-app \
            crates/app/src-tauri/target/x86_64-apple-darwin/release/ipmsg-app \
            crates/app/src-tauri/target/aarch64-apple-darwin/release/ipmsg-app

      - name: Build arm64 .app bundle
        run: cargo tauri build --manifest-path crates/app/src-tauri/Cargo.toml --target aarch64-apple-darwin --bundles macos

      - name: Create universal .app and DMG
        run: |
          APP="crates/app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ipmsg-torrent.app"
          cp release/ipmsg-app "$APP/Contents/MacOS/ipmsg-app"
          mkdir -p release/dmg
          cp -R "$APP" release/dmg/
          ln -s /Applications release/dmg/Applications
          hdiutil create -volname "IPMsg-Torrent" -srcfolder release/dmg \
            -ov -format UDZO "release/IPMsg-Torrent-universal.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/IPMsg-Torrent-universal.dmg

  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          sdkmanager "ndk;27.0.12077973" "build-tools;36.0.0" "platforms;android-36"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Build Android APK
        run: cargo tauri android build --manifest-path crates/app/src-tauri/Cargo.toml --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: crates/app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts/ -name '*.msi' -exec cp {} release/ \;
          find artifacts/ -name '*.exe' -exec cp {} release/ \;
          find artifacts/ -name '*.dmg' -exec cp {} release/ \;
          find artifacts/ -name '*.apk' -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "IPMsg-Torrent $TAG" \
            --generate-notes \
            release/*
